name: Google Cloud Function Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Auth ke GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      # 2. Setup gcloud
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 3. Deploy Cloud Function Gen 2 (Express / Node.js)
      - name: Deploy Cloud Function (Gen 2)
        run: |
          ENV_VARS="DB_HOST=${{ secrets.DB_HOST }}"
          ENV_VARS="${ENV_VARS},DB_USER=${{ secrets.DB_USER }}"
          ENV_VARS="${ENV_VARS},DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          ENV_VARS="${ENV_VARS},DB_NAME=${{ secrets.DB_NAME }}"
          ENV_VARS="${ENV_VARS},DB_PORT=${{ secrets.DB_PORT }}"
          ENV_VARS="${ENV_VARS},JWT_SECRET=${{ secrets.JWT_SECRET }}"
          ENV_VARS="${ENV_VARS},JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}"
          ENV_VARS="${ENV_VARS},NODE_ENV=${{ secrets.NODE_ENV }}"
          ENV_VARS="${ENV_VARS},BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}"
          ENV_VARS="${ENV_VARS},BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}"
          ENV_VARS="${ENV_VARS},UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}"
          ENV_VARS="${ENV_VARS},UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}"
          ENV_VARS="${ENV_VARS},CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"
          ENV_VARS="${ENV_VARS},GDRIVE_FOLDER_PROPOSALS=${{ secrets.GDRIVE_FOLDER_PROPOSALS }}"
          ENV_VARS="${ENV_VARS},GDRIVE_FOLDER_REPORTS=${{ secrets.GDRIVE_FOLDER_REPORTS }}"
          ENV_VARS="${ENV_VARS},GDRIVE_FOLDER_PROFILES=${{ secrets.GDRIVE_FOLDER_PROFILES }}"
          ENV_VARS="${ENV_VARS},GDRIVE_FOLDER_BIMBINGAN=${{ secrets.GDRIVE_FOLDER_BIMBINGAN }}"
          ENV_VARS="${ENV_VARS},GDRIVE_FOLDER_DEFAULT=${{ secrets.GDRIVE_FOLDER_DEFAULT }}"
          ENV_VARS="${ENV_VARS},MAILTRAP_API_TOKEN=${{ secrets.MAILTRAP_API_TOKEN }}"
          ENV_VARS="${ENV_VARS},ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}"
          ENV_VARS="${ENV_VARS},ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"

          gcloud functions deploy kavana \
            --region=asia-southeast2 \
            --runtime=nodejs22 \
            --gen2 \
            --source=. \
            --entry-point=kavana \
            --trigger-http \
            --allow-unauthenticated \
            --timeout=540s \
            --service-account=renz-cloud@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="${ENV_VARS}"

      # 4. Optional: Cek apakah function sudah berhasil
      - name: Check Function Exists
        run: gcloud functions describe kavana --region=asia-southeast2
